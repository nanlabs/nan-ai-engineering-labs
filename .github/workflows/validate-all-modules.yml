name: Validate All Modules

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pathlib
      - name: Run module structure validation
        shell: bash
        run: python scripts/validate_learning_labs.py
      - name: Run English content validation
        shell: bash
        run: python scripts/validate_english_content.py
      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-output
          path: "*.json"
          if-no-files-found: ignore
