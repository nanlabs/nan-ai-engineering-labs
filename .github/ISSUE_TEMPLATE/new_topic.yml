name: New topic request
description: Propose a new topic or module addition
labels: ["new-topic"]
body:
  - type: input
    id: module
    attributes:
      label: Target module
      placeholder: "e.g. 01-programming-math-for-ml"
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: Proposed topic title
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Learning outcome
      description: What the learner can do after this topic.
    validations:
      required: true
  - type: textarea
    id: prereq
    attributes:
      label: Prerequisites
  - type: textarea
    id: refs
    attributes:
      label: References (authoritative URLs)
    validations:
      required: true
