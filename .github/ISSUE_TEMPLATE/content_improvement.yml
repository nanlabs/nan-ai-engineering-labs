name: Content improvement
description: Existing module content needs to be improved (theory, examples, practices, evaluations)
labels: ["content"]
body:
  - type: input
    id: module
    attributes:
      label: Module path
      placeholder: "e.g. modules/01-programming-math-for-ml"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - README
        - theory
        - examples
        - practices
        - mini-project
        - evaluation
        - other
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Proposed improvement
    validations:
      required: true
